<!DOCTYPE html>
<html>
<head>
<title>VR Clothing Try Room</title>
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>

<body>

<a-scene background="color:#808080">


<!-- Assets -->
<a-assets>
<a-asset-item id="man" src="man.glb"></a-asset-item>
<a-asset-item id="dress" src="dress.glb"></a-asset-item>
</a-assets>

<!-- Camera -->
<a-camera position="0 1.6 5">
<a-cursor></a-cursor>
</a-camera>

<!-- Floor -->
<a-plane rotation="-90 0 0"
width="10"
height="11"
color="#707070">
</a-plane>

<!-- Room Walls -->
<a-box position="0 2 -5" width="10" height="4" depth="0.15" color="#9a9a9a"></a-box>
<a-box position="-5 2 0" width="0.1" height="4" depth="10" color="#9a9a9a"></a-box>
<a-box position="5 2 0" width="0.1" height="4" depth="10" color="#9a9a9a"></a-box>

<!-- Ceiling -->
<a-box position="0 4 0" width="10" height="0.1" depth="10" color="#9a9a9a"></a-box>

<!-- Man Model (Center) -->
<a-entity 
gltf-model="#man"
position="0 0 -2"
scale="1 1 1"
rotation="0 180 0">
</a-entity>

<!-- Hanging Rod -->
<a-cylinder 
position="-4 2 -2"
rotation="0 0 90"
radius="0.05"
height="2"
color="black">
</a-cylinder>

<!-- Dress Hanging on Left Wall -->
<a-entity
gltf-model="#dress"
position="-4 1 -2"
scale="1 1 1"
rotation="0 90 0">
</a-entity>

<!-- Lighting -->
<a-light type="ambient" intensity="0.6"></a-light>

<a-light 
type="point"
position="0 3 0"
intensity="1.2"
distance="10">
</a-light>

<a-light 
type="spot"
position="0 3 2"
rotation="-60 0 0"
intensity="1"
angle="30">
</a-light>

</a-scene>

</body>
</html>
